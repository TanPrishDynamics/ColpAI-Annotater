<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ColpAI Annotator{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap');

        :root[data-theme="light"] {
            --bg: #F0FDFA;
            --surface: #FFFFFF;
            --surface-2: #E0F2FE;
            --fg: #134E4A;
            --fg-muted: #475569;
            --accent: #0891B2;
            --accent-hover: #0E7490;
            --danger: #EF4444;
            --success: #10B981;
            --border: #CCFBF1;
            --border-strong: #99F6E4;
            --font-heading: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 16px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        header .user-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
            color: var(--fg-muted);
        }
        main {
            flex: 1;
            padding: 32px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h2 {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--fg);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .stat {
            background: var(--surface-2);
            padding: 20px;
            border-radius: 10px;
        }
        .stat .label { font-size: 12px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat .value { font-size: 28px; font-weight: 600; margin-top: 8px; }
        button, .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            min-height: 44px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        button:hover, .btn:hover { background: var(--accent-hover); }
        button.secondary, .btn.secondary {
            background: var(--surface-2);
            color: var(--fg);
            border: 1px solid var(--border);
        }
        button.secondary:hover, .btn.secondary:hover { background: var(--border); }
        button.danger { background: var(--danger); }
        input, select {
            background: var(--surface);
            color: var(--fg);
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            padding: 10px 12px;
            min-height: 44px;
            font-size: 14px;
            width: 100%;
            transition: all 0.2s ease;
        }
        input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
        label { display: block; font-size: 13px; color: var(--fg-muted); margin-bottom: 6px; }
        .field { margin-bottom: 16px; }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert.error { background: rgba(255, 91, 91, 0.15); color: var(--danger); border: 1px solid rgba(255, 91, 91, 0.3); }
        .alert.success { background: rgba(70, 201, 139, 0.15); color: var(--success); border: 1px solid rgba(70, 201, 139, 0.3); }
        .muted { color: var(--fg-muted); font-size: 13px; }
        code { background: var(--surface-2); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
