# nginx reverse proxy for ColpAI.
# Install:
#   sudo cp deploy/nginx-colpai.conf /etc/nginx/sites-available/colpai
#   sudo ln -s /etc/nginx/sites-available/colpai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then provision HTTPS:
#   sudo certbot --nginx -d colpai.yourdomain.com
# certbot rewrites this file to add the TLS listener + an HTTP->HTTPS redirect.

server {
    listen 80;
    server_name colpai.yourdomain.com;   # <-- change to your domain

    # Allow large export/bundle downloads and image uploads.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bundle exports of big datasets can stream for a while.
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Serve static assets directly (small perf win).
    location /static/ {
        alias /opt/colpai/ColpAi-Annotater/app/static/;
        expires 1h;
    }
}
